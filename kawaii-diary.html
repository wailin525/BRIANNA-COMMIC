<title>Kawaii Diary Book 1 — Anna</title>

<style>
:root{
  --paper:#fdf8ee;--ink:#2a1f17;--pink:#e85a8a;
  --gold:#d8a23c;--teal:#5aaadd;--orange:#e87040;
  --warmline:#f0cca8;--marker:#c85a20;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#5a3828;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:20px 0;
  font-family:'Patrick Hand',sans-serif;
}
#book{position:relative;width:min(520px,96vw);aspect-ratio:5/7}
.page{
  position:absolute;inset:0;background:var(--paper);
  border-radius:4px;box-shadow:4px 5px 22px #0008;
  display:none;overflow:hidden;
}
.page.active{display:block}
#nav{display:flex;align-items:center;gap:14px;margin-top:14px}
#nav button{
  background:var(--orange);color:#fff;border:none;border-radius:20px;
  padding:7px 24px;font-family:'Caveat',cursive;font-size:1.1rem;cursor:pointer;
  transition:opacity .15s;
}
#nav button:hover{opacity:.82}
#ctr{font-family:'Caveat',cursive;color:#ddd;font-size:1.1rem}
.topbar{
  width:100%;max-width:900px;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:18px;color:#fdf8ee;font-family:'Caveat',cursive;
}
.topbar a{
  color:#fdf8ee;text-decoration:none;background:rgba(0,0,0,.25);
  padding:8px 16px;border-radius:30px;border:1.5px solid rgba(255,255,255,.3);
  font-size:18px;transition:all .2s;
}
.topbar a:hover{background:rgba(255,255,255,.15);transform:translateY(-2px);}
.brand{font-size:22px;letter-spacing:1px;opacity:.85;}
</style>
</head>

<script>
const N=12; let cur=1;
function go(d){
  cur=Math.max(1,Math.min(N,cur+d));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+cur).classList.add('active');
  document.getElementById('ctr').textContent=cur+' / '+N;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
</script>
